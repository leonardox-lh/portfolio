<section id="tools">

        Especializado en Vue.js y Angular para construir interfaces dinámicas y responsivas
      </div>
      <div class="icons">
        <div class="cont_icon" title="Html5"><img src="assets/img/icons/html.png"></div>
        <div class="cont_icon" title="css3"><img src="assets/img/icons/css.png"></div>
        <div class="cont_icon" title="java Script"><img src="assets/img/icons/js.png"></div>

        <div class="cont_icon" title="wordpress"><img src="assets/img/icons/wordpress.svg"></div>

      </div>
    </div>
    <div class="cont_tools">

        <div class="cont_icon" title="flutter"><img src="assets/img/icons/flutter.png"></div>
        <div class="cont_icon" title="My Sql"><img src="assets/img/icons/mysql.png"></div>

      </div>
