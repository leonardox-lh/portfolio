<section class="projects" id="projects">
  <app-title [title]="title" scrollReveal></app-title>

  <div class="projects-grid">
    <div class="project-card" *ngFor="let project of projects; let i = index" scrollReveal [revealDelay]="i * 100">

      <!-- Browser frame -->
      <div class="browser-frame" (click)="toggleInfo(i)">
        <div class="browser-bar">
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
          <div class="browser-url">
            <i class="fas fa-lock"></i>
            <span>{{ project.url }}</span>
          </div>
          <button class="expand-btn" title="Ver imagen completa"
                  (click)="openLightbox(project.images[activeImage[i] || 0]); $event.stopPropagation()">
            <i class="fas fa-expand"></i>
          </button>
          <span class="info-hint" title="Ver info"><i class="fas fa-info-circle"></i></span>
        </div>

        <div class="browser-screen">
          <img [src]="project.images[activeImage[i] || 0]" alt="{{ project.name }}" class="browser-img">

          <!-- Info overlay -->
          <div class="info-overlay" [class.info-overlay-open]="openInfo[i]" (click)="$event.stopPropagation()">
            <button class="overlay-close" (click)="toggleInfo(i)"><i class="fas fa-times"></i></button>
            <h2>{{ project.name }}</h2>
            <p class="overlay-role"><i class="fas fa-user-tie"></i> {{ project.role }}</p>
            <p class="overlay-desc">{{ project.description }}</p>
            <div class="overlay-tools">
              <img *ngFor="let tool of project.tools" [src]="tool[0]" [title]="tool[1]">
            </div>
            <div class="overlay-btns">
              <a *ngIf="project.github" [href]="project.github" target="_blank" class="overlay-btn">
                <i class="fa-solid fa-code"></i> Código
              </a>
              <a [href]="project.url" target="_blank" class="overlay-btn overlay-btn-primary">
                <i class="fa-solid fa-globe"></i> Ver proyecto
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Thumbnails -->
      <div class="thumbnails" *ngIf="project.images.length > 1">
        <div *ngFor="let img of project.images; let j = index"
             class="thumb"
             [class.thumb-active]="(activeImage[i] || 0) === j"
             (click)="setImage(i, j)">
          <img [src]="img" alt="">
        </div>
      </div>

    </div>
  </div>
</section>

<!-- Lightbox -->
<div class="lightbox" *ngIf="lightboxSrc" (click)="closeLightbox()">
  <button class="lightbox-close" (click)="closeLightbox()"><i class="fas fa-times"></i></button>
  <img [src]="lightboxSrc" alt="" (click)="$event.stopPropagation()">
</div>
